name: Docker Web App CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'dockerized-web-app/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'dockerized-web-app/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: ./dockerized-web-app
        run: docker build -t sylvia-devops-site:ci .

      - name: Run container from built image
        working-directory: ./dockerized-web-app
        run: docker run -d -p 8080:80 --name ci-test-container sylvia-devops-site:ci

      - name: Wait for container to be ready
        run: sleep 3

      - name: Verify site responds
        run: |
          RESPONSE=$(curl -s http://localhost:8080)
          echo "$RESPONSE" | grep "Hello from a Docker Container" || (echo "Site content check failed" && exit 1)

      - name: Clean up container
        if: always()
        run: docker rm -f ci-test-container

  push-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        working-directory: ./dockerized-web-app
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/devops-portfolio-site:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-portfolio-site:latest

  deploy:
    needs: push-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devops-portfolio-site:latest
            docker rm -f devops-site || true
            docker run -d -p 8080:80 --name devops-site ${{ secrets.DOCKERHUB_USERNAME }}/devops-portfolio-site:latest
